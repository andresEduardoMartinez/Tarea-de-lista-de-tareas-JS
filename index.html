<!doctype html>
<html data-bs-theme="dark">
    <head>
        <meta charset="utf-8" />
        <title>Tareas</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />
    </head>
    <body>
        <div class="container" id="mainContainer">
            <div id="title" class="col-12">
                <h1>Lista de tareas:</h1>
            </div>
            <div class="col-12" id="taskColumn">
                <div class="input-group mb-3">
                    <input
                        id="task-name"
                        type="text"
                        class="form-control"
                        placeholder="Nombre de tarea"
                        aria-label="Nombre de tarea"
                        aria-describedby="button-addon2"
                    />
                    <input
                        id="task-desc"
                        type="text"
                        class="form-control"
                        placeholder="Descripción de tarea"
                        aria-label="Descripcion de tarea"
                        aria-describedby="button-addon2"
                    />
                    <button class="btn btn-success" type="button" id="add">
                        Añadir
                    </button>
                </div>
                <div id="todos" class="col-12"></div>
            </div>
        </div>

        <!--Button functionality script import-->
        <script src="js/script.js"></script>
        <!--Bootstrap script import-->
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>
    </body>
</html>
